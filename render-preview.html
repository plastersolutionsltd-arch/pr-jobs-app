<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Render Preview — P&R</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --green: #66FF33; --green-glow: rgba(102,255,51,0.22); --green-dim: rgba(102,255,51,0.12);
      --dark: #0f0f0f; --card: #1a1a1a; --border: #272727; --border-hi: #333;
      --text: #fff; --muted: #5e5e5e; --muted2: #888;
      --brand: 'Montserrat', 'Arial Black', Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--dark); color: var(--text); font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; }

    .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .screen.active { display: flex; }

    .hdr { background: #111; border-bottom: 1px solid rgba(102,255,51,0.1); padding: 12px 16px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .hdr-back { background: none; border: none; color: var(--green); font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: var(--brand); font-weight: 700; }
    .hdr-title { font-family: var(--brand); font-size: 16px; font-weight: 800; }
    .hdr-r { min-width: 60px; text-align: right; }
    .hdr-action { background: none; border: none; color: var(--green); font-size: 13px; font-family: var(--brand); font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }

    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }

    .sec-lbl { font-family: var(--brand); font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); margin-bottom: 10px; }

    /* Upload area */
    .upload-area { border: 2px dashed var(--border-hi); border-radius: 16px; padding: 36px 20px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: border-color 0.15s; }
    .upload-area:active { border-color: var(--green); }
    .upload-icon { font-size: 44px; margin-bottom: 10px; }
    .upload-title { font-family: var(--brand); font-size: 16px; font-weight: 800; margin-bottom: 5px; }
    .upload-sub { font-size: 13px; color: var(--muted2); }

    /* System cards */
    .system-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .system-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .system-card.sel { border-color: var(--green); background: #0d1a0d; }
    .system-card-name { font-family: var(--brand); font-size: 12px; font-weight: 800; }
    .system-card.sel .system-card-name { color: var(--green); }
    .system-card-desc { font-size: 10px; color: var(--muted2); margin-top: 3px; }

    /* Colour palette */
    .colour-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .colour-swatch { width: 48px; height: 48px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; position: relative; }
    .colour-swatch.sel { border-color: var(--green); transform: scale(1.1); box-shadow: 0 0 0 3px rgba(102,255,51,0.3); }
    .colour-swatch-name { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 9px; color: var(--muted2); font-family: var(--brand); font-weight: 700; letter-spacing: 0.3px; }

    /* Toolbar */
    .toolbar { background: #111; border-top: 1px solid var(--border); padding: 12px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); display: flex; gap: 8px; flex-shrink: 0; }
    .tbtn { flex: 1; padding: 12px 8px; border-radius: 12px; border: none; cursor: pointer; font-family: var(--brand); font-size: 11px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; transition: transform 0.1s; }
    .tbtn:active { transform: scale(0.95); }
    .tbtn-green { background: var(--green); color: #111; box-shadow: 0 3px 12px var(--green-glow); }
    .tbtn-grey { background: var(--card); color: var(--muted2); border: 1px solid var(--border); }
    .tbtn:disabled { opacity: 0.4; pointer-events: none; }

    /* Canvas screen */
    .steps { display: flex; gap: 5px; padding: 8px 16px; flex-shrink: 0; background: #111; border-bottom: 1px solid var(--border); }
    .step { flex: 1; height: 3px; border-radius: 2px; background: var(--border); }
    .step.done { background: var(--green); }
    .step.cur  { background: rgba(102,255,51,0.45); }

    .instr { background: #131313; padding: 10px 16px; flex-shrink: 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
    .instr-num { width: 26px; height: 26px; border-radius: 50%; background: var(--green); color: #111; font-family: var(--brand); font-weight: 900; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .instr-text { font-size: 13px; font-weight: 600; }
    .instr-sub  { font-size: 11px; color: var(--muted2); margin-top: 2px; }

    .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
    #main-canvas { display: block; max-width: 100%; max-height: 100%; touch-action: none; }

    /* Colour swatch on canvas bar */
    .canvas-colour-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #0d0d0d; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    .canvas-colour-bar::-webkit-scrollbar { display: none; }
    .cswatch { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: all 0.12s; }
    .cswatch.sel { border-color: var(--green); box-shadow: 0 0 0 2px rgba(102,255,51,0.3); transform: scale(1.15); }
    .cswatch-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

    /* Opacity / compare bar */
    .opacity-bar { background: #0d0d0d; border-top: 1px solid var(--border); padding: 10px 14px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
    .opacity-lbl { font-family: var(--brand); font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); flex-shrink: 0; }
    .compare-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--muted2); font-family: var(--brand); font-size: 10px; font-weight: 800; letter-spacing: 0.5px; cursor: pointer; white-space: nowrap; }
    .compare-btn.active { background: var(--green); color: #111; border-color: var(--green); }

    /* Zoom strip */
    .zoom-strip { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 10; }
    .zoom-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.25); color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .zoom-btn:active { background: rgba(102,255,51,0.35); }
    .zoom-level { font-family: var(--brand); font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.7); padding: 2px 0; }
    .fit-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; }

    /* Mode toggle */
    .mode-row { background: #0a0a0a; border-top: 1px solid var(--border); padding: 8px 12px; flex-shrink: 0; }
    .mode-toggle { display: flex; background: #111; border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 3px; }
    .mode-btn { flex: 1; padding: 7px 10px; border-radius: 7px; border: none; cursor: pointer; font-family: var(--brand); font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.15s; background: none; color: var(--muted2); display: flex; align-items: center; justify-content: center; gap: 5px; }
    .mode-btn svg { width: 12px; height: 12px; }
    .mode-btn.active-draw { background: var(--green); color: #111; }
    .mode-btn.active-pan  { background: #5599ff; color: #fff; }

    /* Result screen */
    .preview-thumb { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 14px; aspect-ratio: 4/3; background: #000; }
    .preview-thumb canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
    .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .info-row2 { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .info-row2:last-child { border-bottom: none; }
    .info-lbl2 { font-size: 12px; color: var(--muted2); }
    .info-val2 { font-family: var(--brand); font-size: 13px; font-weight: 800; color: var(--text); }
    .colour-dot { display: inline-block; width: 14px; height: 14px; border-radius: 4px; margin-right: 6px; vertical-align: middle; }

    .btn-full { width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: var(--brand); font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: transform 0.1s; margin-bottom: 8px; }
    .btn-full:active { transform: scale(0.97); }
    .btn-green { background: var(--green); color: #111; box-shadow: 0 4px 16px var(--green-glow); }
    .btn-outline { background: none; border: 1.5px solid var(--border-hi); color: var(--muted2); }

    .hidden { display: none !important; }

    /* Site visit photo picker */
    .sv-photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .sv-photo-thumb { position: relative; aspect-ratio: 4/3; border-radius: 10px; overflow: hidden; cursor: pointer; border: 2.5px solid transparent; transition: border-color 0.15s; }
    .sv-photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sv-photo-thumb.sel { border-color: var(--green); }
    .sv-photo-thumb.sel::after { content: '✓'; position: absolute; top: 4px; right: 5px; background: var(--green); color: #111; font-size: 11px; font-family: var(--brand); font-weight: 900; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sv-photo-caption { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.65); color: #fff; font-size: 9px; padding: 3px 5px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── TRAFFIC LIGHTS (Mac PWA only) ── */
    @media (pointer: fine) {
      .tl-bar { position: fixed; top: 0; left: 0; z-index: 9999; display: flex; align-items: center; gap: 7px; padding: 10px 14px; }
      .tl-bar button { width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.12s; }
      .tl-bar button:hover { filter: brightness(1.15); }
      .tl-bar button:active { opacity: 0.55; }
      .tl-red    { background: #FF5F56; }
      .tl-yellow { background: #FFBD2E; }
      .tl-green  { background: #27C93F; }
      .hdr { padding-left: 70px; }
    }
  </style>
</head>
<body>

<div class="tl-bar">
  <button class="tl-red"    onclick="goHome()"       title="Close"></button>
  <button class="tl-yellow" onclick="window.blur()"  title="Minimise"></button>
  <button class="tl-green"  onclick="tlFullscreen()" title="Fullscreen"></button>
</div>

<!-- ══════════════════════════════════════ SETUP SCREEN ══ -->
<div id="screen-setup" class="screen active">
  <div class="hdr">
    <button class="hdr-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Jobs
    </button>
    <div class="hdr-title">Render Preview</div>
    <div class="hdr-r"></div>
  </div>
  <div class="scroll">

    <!-- Site visit photos -->
    <div id="sv-photos-block" class="hidden">
      <div class="sec-lbl">Site Visit Photos — tap to use</div>
      <div class="sv-photo-grid" id="sv-photo-grid"></div>
      <div class="sec-lbl" style="margin-top:4px">Or Take / Upload New</div>
    </div>
    <div id="sv-photos-loading" style="font-size:12px;color:#666;margin-bottom:8px">Loading site visit photos…</div>

    <!-- Photo upload -->
    <div class="upload-area" onclick="document.getElementById('photo-input').click()">
      <div class="upload-icon" id="upload-icon">🏠</div>
      <div class="upload-title" id="upload-title">Choose House Photo</div>
      <div class="upload-sub" id="upload-sub">Take a photo on site or choose from gallery</div>
    </div>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="onPhotoChosen(this)">

    <!-- Render system -->
    <div class="sec-lbl">Render System</div>
    <div class="system-grid" id="system-grid"></div>

    <!-- Colour palette -->
    <div class="sec-lbl">Colour</div>
    <div class="colour-grid" id="colour-grid"></div>
    <div style="height:20px"></div>

  </div>
  <div class="toolbar">
    <button class="tbtn tbtn-green" id="continue-btn" style="flex:2" disabled onclick="startCanvas()">Continue →</button>
  </div>
</div>


<!-- ══════════════════════════════════════ CANVAS SCREEN ══ -->
<div id="screen-canvas" class="screen">
  <div class="steps">
    <div class="step cur"  id="cdot-1"></div>
    <div class="step"      id="cdot-2"></div>
    <div class="step"      id="cdot-3"></div>
  </div>
  <div class="instr" id="instr-bar">
    <div class="instr-num" id="instr-num">1</div>
    <div>
      <div class="instr-text" id="instr-text">Tap around the wall area</div>
      <div class="instr-sub"  id="instr-sub">Outline the wall you want to render</div>
    </div>
  </div>

  <!-- Quick colour strip -->
  <div class="canvas-colour-bar" id="canvas-colour-bar"></div>

  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div class="zoom-strip">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <div class="zoom-level" id="zoom-level">1×</div>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <button class="fit-btn" onclick="resetView()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </button>
    </div>
  </div>

  <!-- Opacity + compare -->
  <div class="opacity-bar">
    <span class="opacity-lbl">Opacity</span>
    <input type="range" id="opacity-slider" min="10" max="90" value="55" style="flex:1;accent-color:#66FF33" oninput="setOverlayOpacity(this.value)">
    <button class="compare-btn" id="compare-btn" ontouchstart="showOriginal()" ontouchend="showPreview()" onmousedown="showOriginal()" onmouseup="showPreview()">Hold: Before</button>
  </div>

  <!-- Mode row -->
  <div class="mode-row">
    <div class="mode-toggle">
      <button class="mode-btn active-draw" id="btn-draw" onclick="setMode('draw')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Draw
      </button>
      <button class="mode-btn" id="btn-pan" onclick="setMode('pan')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        Pan
      </button>
      <button class="mode-btn" id="btn-undo" onclick="undoLast()" style="flex:0;min-width:60px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
        Undo
      </button>
    </div>
  </div>

  <div class="toolbar">
    <button class="tbtn tbtn-grey" onclick="showScreen('screen-setup')">← Back</button>
    <button class="tbtn tbtn-green" id="tbtn-preview" style="flex:2" onclick="generatePreview()" disabled>Preview →</button>
  </div>
</div>


<!-- ══════════════════════════════════════ RESULT SCREEN ══ -->
<div id="screen-result" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('screen-canvas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </button>
    <div class="hdr-title">Preview</div>
    <div class="hdr-r">
      <button class="hdr-action" onclick="saveToJob()">Save</button>
    </div>
  </div>
  <div class="scroll">

    <!-- Before / After toggle -->
    <div style="display:flex;gap:4px;margin-bottom:12px">
      <button id="tab-after"  onclick="resultTab('after')"  style="flex:1;padding:10px;border-radius:10px;border:none;font-family:var(--brand);font-size:11px;font-weight:800;letter-spacing:0.5px;cursor:pointer;background:var(--green);color:#111">AFTER</button>
      <button id="tab-before" onclick="resultTab('before')" style="flex:1;padding:10px;border-radius:10px;border:none;font-family:var(--brand);font-size:11px;font-weight:800;letter-spacing:0.5px;cursor:pointer;background:var(--card);color:var(--muted2);border:1px solid var(--border)">BEFORE</button>
    </div>

    <div class="preview-thumb">
      <canvas id="result-canvas"></canvas>
    </div>

    <div class="info-card">
      <div class="info-row2">
        <span class="info-lbl2">Render System</span>
        <span class="info-val2" id="res-system">—</span>
      </div>
      <div class="info-row2">
        <span class="info-lbl2">Colour</span>
        <span class="info-val2" id="res-colour">—</span>
      </div>
    </div>

    <!-- Opacity adjust on result -->
    <div class="info-card" style="padding:12px 16px">
      <div class="opacity-bar" style="padding:0;border:none;background:none">
        <span class="opacity-lbl">Opacity</span>
        <input type="range" id="result-opacity" min="10" max="90" value="55" style="flex:1;accent-color:#66FF33" oninput="setOverlayOpacity(this.value);renderResult()">
      </div>
    </div>

    <button class="btn-full btn-green" onclick="saveToJob()">Save to Job</button>
    <button class="btn-full btn-outline" onclick="showScreen('screen-canvas')">Adjust Outline</button>
    <button class="btn-full btn-outline" onclick="showScreen('screen-setup')">Try Different Colour</button>

  </div>
</div>


<script>
// ══════════════════════════════════════════════════════════
// SUPABASE + JOB
// ══════════════════════════════════════════════════════════
const SB_URL = 'https://ngakblcdnuqectjappkl.supabase.co';
const SB_KEY = 'sb_publishable_wX0TOGQTtNWi0ex14ux6Hw_eKVge5cJ';
const sb = supabase.createClient(SB_URL, SB_KEY);
const params = new URLSearchParams(location.search);
const jobId  = params.get('jobId');
let job = null;

async function loadJob() {
  if (!jobId) return;
  try {
    const all = JSON.parse(localStorage.getItem('pr_jobs') || '[]');
    const local = all.find(j => j.id === jobId);
    if (local) job = local;
  } catch(e) {}
  try {
    const { data } = await sb.from('jobs').select('*').eq('id', jobId).single();
    if (data) {
      job = Object.assign({}, data.data, { id: data.id, name: data.name, status: data.status, created: data.created });
      buildSVPhotoPicker();
    }
  } catch(e) {}
}

function buildSVPhotoPicker() {
  const loadingEl = document.getElementById('sv-photos-loading');
  const block     = document.getElementById('sv-photos-block');
  const grid      = document.getElementById('sv-photo-grid');
  const svPhotos  = job?.siteVisit?.photos;
  if (!svPhotos || !svPhotos.length) {
    if (loadingEl) loadingEl.textContent = jobId ? 'No site visit photos saved yet.' : '';
    return;
  }
  if (loadingEl) loadingEl.style.display = 'none';
  block.style.display = '';
  block.classList.remove('hidden');
  grid.innerHTML = svPhotos.map((p, i) => `
    <div class="sv-photo-thumb" id="svpt-${i}" onclick="selectSVPhoto(${i})">
      <img src="${p.dataUrl}" alt="Site photo ${i+1}">
      ${p.caption ? `<div class="sv-photo-caption">${esc(p.caption)}</div>` : ''}
    </div>`).join('');
}

function selectSVPhoto(i) {
  const svPhotos = job?.siteVisit?.photos;
  if (!svPhotos || !svPhotos[i]) return;
  document.querySelectorAll('.sv-photo-thumb').forEach(el => el.classList.remove('sel'));
  document.getElementById('svpt-' + i).classList.add('sel');
  photoDataUrl = svPhotos[i].dataUrl;
  document.getElementById('upload-icon').textContent = '✅';
  document.getElementById('upload-title').textContent = 'Photo selected ✓';
  document.getElementById('upload-sub').textContent = 'Tap upload area to change';
  checkContinue();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function saveToJob() {
  if (!job) { goHome(); return; }
  const colour = COLOURS.find(c => c.id === selectedColourId);
  const system = RENDER_SYSTEMS.find(s => s.id === selectedSystemId);

  // Capture rendered result as compressed image
  const afterImg = captureResultImage();

  job.renderPreviews = job.renderPreviews || [];
  job.renderPreviews.unshift({
    system:       system ? system.name : '',
    colour:       colour ? colour.name : '',
    hex:          colour ? colour.hex : '',
    opacity:      overlayOpacity,
    imageDataUrl: afterImg,
    savedAt:      new Date().toISOString(),
  });

  // Always write render choice back to site visit (create siteVisit stub if none yet)
  const SYSTEM_TO_FINISH = {
    silicone:    'Full Silicone Render',
    monocouche:  'Monocouche Render',
    k_rend:      'K-Rend',
    ewi:         'EWI System',
    sand_cement: 'Sand & Cement Render',
    pebbledash:  'Roughcast / Pebbledash',
  };
  const COLOUR_TO_SV = {
    white: 'Pure White', off_white: 'Off White', ivory: 'Ivory', cream: 'Cream',
    light_grey: 'Light Grey', mid_grey: 'Mid Grey', dark_grey: 'Dark Grey',
    graphite: 'Anthracite', sand: 'Stone', buff: 'Buff', stone: 'Stone', mocha: 'Mocha / Brown',
  };
  job.siteVisit = job.siteVisit || {};
  if (system) job.siteVisit.finishType = SYSTEM_TO_FINISH[system.id] || system.name;
  if (colour) job.siteVisit.colour     = COLOUR_TO_SV[colour.id]  || colour.name;
  if (colour) job.siteVisit.renderHex  = colour.hex;
  try {
    const all = JSON.parse(localStorage.getItem('pr_jobs') || '[]');
    const idx = all.findIndex(j => j.id === jobId);
    if (idx >= 0) all[idx] = job; else all.push(job);
    localStorage.setItem('pr_jobs', JSON.stringify(all));
  } catch(e) {}
  try { await sb.from('jobs').upsert({ id: job.id, name: job.name||'', status: job.status||'enquiry', created: job.created||Date.now(), data: job }); } catch(e) {}
  goHome();
}

function goHome() {
  window.location.href = jobId
    ? 'https://plastersolutionsltd-arch.github.io/pr-jobs-app/?openJob=' + jobId
    : 'https://plastersolutionsltd-arch.github.io/pr-jobs-app/';
}

// ══════════════════════════════════════════════════════════
// SETUP SCREEN
// ══════════════════════════════════════════════════════════
let photoDataUrl   = null;
let selectedSystemId = 'silicone';
let selectedColourId = 'cream';

function buildSetup() {
  // Systems
  const sg = document.getElementById('system-grid');
  sg.innerHTML = RENDER_SYSTEMS.map(s => `
    <div class="system-card ${s.id === selectedSystemId ? 'sel' : ''}" id="sys-${s.id}" onclick="selectSystem('${s.id}')">

function selectSystem(id) {

  const el = document.getElementById('col-' + id);

function onPhotoChosen(input) {

  const reader = new FileReader();
  reader.onload = e => {

    document.getElementById('upload-icon').textContent = '✅';
    document.getElementById('upload-title').textContent = 'Photo selected';

function checkContinue() {

}

// ══════════════════════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════════════════════
let canvas, ctx, photoImg;
let polyPts   = [];
let isClosed  = false;
let viewZoom  = 1, viewPanX = 0, viewPanY = 0;
let panMode   = false;
let overlayOpacity = 55; // 10–90
let showingOriginal = false;

// Pointer tracking
let activePointers = {}, lastPinchDist = null;
let tapStartX = 0, tapStartY = 0, panStartX = 0, panStartY = 0, didDrag = false;

function startCanvas() {
  showScreen('screen-canvas');
  polyPts = []; isClosed = false;
  viewZoom = 1; viewPanX = 0; viewPanY = 0;
  panMode = false;
  buildCanvasColourBar();
  canvas = document.getElementById('main-canvas');
  ctx = canvas.getContext('2d');
  photoImg = new Image();
  photoImg.onload = () => { fitCanvas(); redraw(); };
  if (!canvas._eventsAttached) {
    canvas.addEventListener('pointerdown',   onPtrDown,   { passive: false });
    canvas.addEventListener('pointermove',   onPtrMove,   { passive: false });
    canvas.addEventListener('pointerup',     onPtrUp,     { passive: false });
    canvas.addEventListener('pointercancel', e => { delete activePointers[e.pointerId]; lastPinchDist = null; }, { passive: false });
    canvas._eventsAttached = true;
  }
  photoImg.src = photoDataUrl;
  setMode('draw');
  updateInstr();
  updatePreviewBtn();
}

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const r = Math.min(wrap.clientWidth / photoImg.naturalWidth, wrap.clientHeight / photoImg.naturalHeight);
  canvas.width  = Math.round(photoImg.naturalWidth  * r);
  canvas.height = Math.round(photoImg.naturalHeight * r);
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}

// Pointer handlers
function onPtrDown(e) {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const count = Object.keys(activePointers).length;
  if (count === 1) {
    tapStartX = e.clientX; tapStartY = e.clientY;
    panStartX = viewPanX;  panStartY = viewPanY;
    didDrag = false;
  } else if (count === 2) {
    const pts = Object.values(activePointers);
    lastPinchDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    didDrag = true;
  }
}

function onPtrMove(e) {
  e.preventDefault();
  if (!activePointers[e.pointerId]) return;
  activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const count = Object.keys(activePointers).length;
  if (count >= 2 && lastPinchDist) {
    const pts = Object.values(activePointers);
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    applyZoom(viewZoom * (dist / lastPinchDist));
    lastPinchDist = dist;
    didDrag = true;
  } else if (count === 1) {
    const dx = e.clientX - tapStartX, dy = e.clientY - tapStartY;
    if (!didDrag && Math.hypot(dx, dy) > 6) didDrag = true;
    if (didDrag && (panMode || viewZoom > 1)) {
      viewPanX = panStartX + dx; viewPanY = panStartY + dy;
      clampPan(); redraw();
      if (panMode) canvas.style.cursor = 'grabbing';
    }
  }
}

function onPtrUp(e) {
  e.preventDefault();
  const wasSingle = Object.keys(activePointers).length === 1;
  delete activePointers[e.pointerId];
  lastPinchDist = null;
  if (panMode) canvas.style.cursor = 'grab';
  if (wasSingle && !didDrag && !panMode && !isClosed) handleTap(e);
}

function tapToImg(e) {
  const r = canvas.getBoundingClientRect();
  const cx = (e.clientX - r.left) * (canvas.width / r.width);
  const cy = (e.clientY - r.top)  * (canvas.height / r.height);
  return { x: (cx - viewPanX) / viewZoom, y: (cy - viewPanY) / viewZoom };
}
function imgToScreen(pt) { return { x: pt.x * viewZoom + viewPanX, y: pt.y * viewZoom + viewPanY }; }

function handleTap(e) {
  if (isClosed) return;
  const { x, y } = tapToImg(e);
  // Close polygon if near first point
  if (polyPts.length >= 3) {
    const fp = imgToScreen(polyPts[0]);
    const r = canvas.getBoundingClientRect();
    const sx = (e.clientX - r.left) * (canvas.width / r.width);
    const sy = (e.clientY - r.top)  * (canvas.height / r.height);
    if (Math.hypot(sx - fp.x, sy - fp.y) < 28) { isClosed = true; redraw(); updateInstr(); updatePreviewBtn(); return; }
  }
  polyPts.push({ x, y });
  redraw(); updateInstr(); updatePreviewBtn();
}

function redraw() {
  if (!canvas || !ctx || !photoImg) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(viewPanX, viewPanY);
  ctx.scale(viewZoom, viewZoom);
  if (showingOriginal) ctx.filter = 'none';
  ctx.drawImage(photoImg, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if (!showingOriginal && polyPts.length >= 1) {
    const colour = COLOURS.find(c => c.id === selectedColourId);
    const hex = colour ? colour.hex : '#DDDDDD';
    const alpha = overlayOpacity / 100;
    const ss = polyPts.map(imgToScreen);

    if (isClosed && ss.length >= 3) {
      // Filled overlay
      ctx.save();
      ctx.beginPath(); ctx.moveTo(ss[0].x, ss[0].y);
      ss.slice(1).forEach(s => ctx.lineTo(s.x, s.y));
      ctx.closePath();
      ctx.fillStyle = hexToRgba(hex, alpha);
      ctx.fill();
      // Subtle outline
      ctx.strokeStyle = hex; ctx.lineWidth = 2; ctx.globalAlpha = 0.7; ctx.stroke();
      ctx.restore();
    } else {
      // Drawing in progress
      if (ss.length >= 2) {
        ctx.beginPath(); ctx.moveTo(ss[0].x, ss[0].y);
        ss.slice(1).forEach(s => ctx.lineTo(s.x, s.y));
        ctx.strokeStyle = '#66FF33'; ctx.lineWidth = 2.5; ctx.stroke();
      }
      // Points
      ss.forEach((s, i) => {
        ctx.beginPath(); ctx.arc(s.x, s.y, i === 0 ? 11 : 7, 0, Math.PI * 2);
        ctx.fillStyle = i === 0 ? '#66FF33' : '#fff'; ctx.fill();
        ctx.strokeStyle = '#66FF33'; ctx.lineWidth = 2; ctx.stroke();
      });
      // Closing guide
      if (polyPts.length >= 3) {
        const fp = imgToScreen(polyPts[0]);
        ctx.beginPath(); ctx.arc(fp.x, fp.y, 24, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(102,255,51,0.4)'; ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
      }
    }
  }

  document.getElementById('zoom-level').textContent = viewZoom === 1 ? '1×' : viewZoom.toFixed(1) + '×';
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function setOverlayOpacity(v) {
  overlayOpacity = +v;
  document.getElementById('opacity-slider').value = v;
  const resultSlider = document.getElementById('result-opacity');
  if (resultSlider) resultSlider.value = v;
  redraw();
}

function showOriginal() { showingOriginal = true;  redraw(); document.getElementById('compare-btn').classList.add('active'); }
function showPreview()  { showingOriginal = false; redraw(); document.getElementById('compare-btn').classList.remove('active'); }

function zoomIn()  { applyZoom(viewZoom * 1.45); }
function zoomOut() { applyZoom(viewZoom / 1.45); }
function resetView() { viewZoom = 1; viewPanX = 0; viewPanY = 0; redraw(); }
function applyZoom(z) {
  viewZoom = Math.max(1, Math.min(8, z));
  if (viewZoom === 1) { viewPanX = 0; viewPanY = 0; }
  clampPan(); redraw();
}
function clampPan() {
  if (!canvas || viewZoom <= 1) { viewPanX = 0; viewPanY = 0; return; }
  viewPanX = Math.max(canvas.width * (1-viewZoom), Math.min(0, viewPanX));
  viewPanY = Math.max(canvas.height * (1-viewZoom), Math.min(0, viewPanY));
}

function setMode(mode) {
  panMode = (mode === 'pan');
  document.getElementById('btn-draw').className = 'mode-btn' + (!panMode ? ' active-draw' : '');
  document.getElementById('btn-pan').className  = 'mode-btn' + ( panMode ? ' active-pan'  : '');
  canvas.style.cursor = panMode ? 'grab' : 'crosshair';
}

function undoLast() {
  if (isClosed) { isClosed = false; }
  else if (polyPts.length > 0) { polyPts.pop(); }
  redraw(); updateInstr(); updatePreviewBtn();
}

function updateInstr() {
  const numEl  = document.getElementById('instr-num');
  const textEl = document.getElementById('instr-text');
  const subEl  = document.getElementById('instr-sub');
  if (isClosed) {
    setStepDots(3);
    numEl.textContent = '✓';
    textEl.textContent = 'Wall outlined';
    subEl.textContent = 'Adjust opacity or tap Preview →';
  } else if (polyPts.length >= 3) {
    setStepDots(2);
    numEl.textContent = '2';
    textEl.textContent = 'Keep tapping or tap ⊙ to close';
    subEl.textContent = polyPts.length + ' points — tap the green dot to close the outline';
  } else if (polyPts.length > 0) {
    setStepDots(1);
    numEl.textContent = '1';
    textEl.textContent = 'Tap the wall corners';
    subEl.textContent = polyPts.length + ' point' + (polyPts.length > 1 ? 's' : '') + ' — keep going';
  } else {
    setStepDots(0);
    numEl.textContent = '1';
    textEl.textContent = 'Tap around the wall area';
    subEl.textContent = 'Outline the wall you want to preview rendered';
  }
}

function setStepDots(active) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('cdot-' + i);
    if (!el) continue;
    el.className = 'step' + (i < active ? ' done' : i === active ? ' cur' : '');
  }
}

function updatePreviewBtn() {
  document.getElementById('tbtn-preview').disabled = polyPts.length < 3;
}

// ══════════════════════════════════════════════════════════
// CANVAS COLOUR BAR
// ══════════════════════════════════════════════════════════
function buildCanvasColourBar() {
  const bar = document.getElementById('canvas-colour-bar');
  bar.innerHTML = COLOURS.map(c => `
    <div class="cswatch ${c.id === selectedColourId ? 'sel' : ''}" id="csw-${c.id}" style="background:${c.hex}"
         title="${c.name}" onclick="canvasSelectColour('${c.id}')"></div>`).join('');
}

function canvasSelectColour(id) {
  selectedColourId = id;
  document.querySelectorAll('.cswatch').forEach(e => e.classList.remove('sel'));
  const el = document.getElementById('csw-' + id);
  if (el) el.classList.add('sel');
  redraw();
}

// ══════════════════════════════════════════════════════════
// RESULT SCREEN
// ══════════════════════════════════════════════════════════
function generatePreview() {
  showScreen('screen-result');
  const colour = COLOURS.find(c => c.id === selectedColourId);
  const system = RENDER_SYSTEMS.find(s => s.id === selectedSystemId);
  document.getElementById('res-system').textContent = system ? system.name : '—';
  document.getElementById('res-colour').innerHTML = colour
    ? `<span class="colour-dot" style="background:${colour.hex}"></span>${colour.name}`
    : '—';
  renderResult();
}

function renderResult() {
  const rc = document.getElementById('result-canvas');
  const rctx = rc.getContext('2d');
  rc.width  = canvas.width;
  rc.height = canvas.height;
  rc.style.width  = '100%';
  rc.style.height = '100%';

  const colour = COLOURS.find(c => c.id === selectedColourId);
  const hex = colour ? colour.hex : '#DDDDDD';
  const alpha = overlayOpacity / 100;

  rctx.clearRect(0, 0, rc.width, rc.height);
  rctx.drawImage(photoImg, 0, 0, rc.width, rc.height);

  if (polyPts.length >= 3) {
    // Scale poly points from canvas → result canvas (same size, so 1:1)
    const scaledPts = polyPts;
    rctx.save();
    rctx.beginPath();
    rctx.moveTo(scaledPts[0].x, scaledPts[0].y);
    scaledPts.slice(1).forEach(p => rctx.lineTo(p.x, p.y));
    rctx.closePath();
    rctx.fillStyle = hexToRgba(hex, alpha);
    rctx.fill();
    rctx.strokeStyle = hex; rctx.lineWidth = 1.5; rctx.globalAlpha = 0.6; rctx.stroke();
    rctx.restore();
  }
}

function resultTab(tab) {
  const rc = document.getElementById('result-canvas');
  const rctx = rc.getContext('2d');
  if (tab === 'before') {
    rctx.clearRect(0, 0, rc.width, rc.height);
    rctx.drawImage(photoImg, 0, 0, rc.width, rc.height);
    document.getElementById('tab-before').style.background = 'var(--green)';
    document.getElementById('tab-before').style.color = '#111';
    document.getElementById('tab-before').style.border = 'none';
    document.getElementById('tab-after').style.background = 'var(--card)';
    document.getElementById('tab-after').style.color = 'var(--muted2)';
    document.getElementById('tab-after').style.border = '1px solid var(--border)';
  } else {
    renderResult();
    document.getElementById('tab-after').style.background = 'var(--green)';
    document.getElementById('tab-after').style.color = '#111';
    document.getElementById('tab-after').style.border = 'none';
    document.getElementById('tab-before').style.background = 'var(--card)';
    document.getElementById('tab-before').style.color = 'var(--muted2)';
    document.getElementById('tab-before').style.border = '1px solid var(--border)';
  }
}

function captureResultImage() {
  // Render a full-res preview to a temp canvas and compress it
  const tmp = document.createElement('canvas');
  tmp.width  = canvas.width;
  tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(photoImg, 0, 0, tmp.width, tmp.height);
  if (polyPts.length >= 3) {
    const colour = COLOURS.find(c => c.id === selectedColourId);
    const hex = colour ? colour.hex : '#DDDDDD';
    tctx.save();
    tctx.beginPath();
    tctx.moveTo(polyPts[0].x, polyPts[0].y);
    polyPts.slice(1).forEach(p => tctx.lineTo(p.x, p.y));
    tctx.closePath();
    tctx.fillStyle = hexToRgba(hex, overlayOpacity / 100);
    tctx.fill();
    tctx.restore();
  }
  // Compress to max 900×650, 78% JPEG — matches quote-rendering.html compressImage settings
  const scale = Math.min(900 / tmp.width, 650 / tmp.height, 1);
  const out = document.createElement('canvas');
  out.width  = Math.round(tmp.width  * scale);
  out.height = Math.round(tmp.height * scale);
  out.getContext('2d').drawImage(tmp, 0, 0, out.width, out.height);
  return out.toDataURL('image/jpeg', 0.78);
}

// ══════════════════════════════════════════════════════════
// SCREEN NAV
// ══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-result') { setTimeout(renderResult, 50); }
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
function tlFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen).call(document.documentElement);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
  }
}
loadJob().then(() => { buildSVPhotoPicker(); setTimeout(buildSVPhotoPicker, 2000); });
buildSetup();
