<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>P&R Solutions — Quote Response</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #66FF33; --dark: #111; --card: #1a1a1a; --border: #2a2a2a; }
    body {
      font-family: -apple-system, Arial, sans-serif;
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 40px;
      color: #fff;
    }
    .logo span { color: var(--green); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 20px; }
    .card h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .card p { font-size: 15px; color: #aaa; line-height: 1.6; margin-bottom: 8px; }
    .card p strong { color: #fff; }
    .ref { font-size: 13px; color: #555; margin-top: 24px; }
    .loading { color: #555; font-size: 15px; text-align: center; }
    .btn-call {
      display: inline-block;
      margin-top: 24px;
      background: none;
      border: 1.5px solid var(--border);
      color: #aaa;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 15px;
      text-decoration: none;
    }
    .accepted .icon-wrap { color: var(--green); }
    .declined .icon-wrap { color: #aaa; }
  </style>
</head>
<body>

  <div class="logo">P&amp;<span>R</span> Solutions</div>
  <div id="content"></div>

  <script>
    var SB_URL = 'https://ngakblcdnuqectjappkl.supabase.co';
    var SB_KEY = 'sb_publishable_wX0TOGQTtNWi0ex14ux6Hw_eKVge5cJ';
    var sb = supabase.createClient(SB_URL, SB_KEY);

    var p         = new URLSearchParams(location.search);
    var action    = p.get('action');
    var jobId     = p.get('jobId');
    var ref       = p.get('ref') || 'your quote';
    var name      = p.get('name') || '';
    var firstName = name.split(' ')[0] || 'there';

    // Show result immediately — no waiting
    if (!jobId || (action !== 'accept' && action !== 'decline')) {
      document.getElementById('content').innerHTML =
        '<div class="card"><div class="icon">⚠️</div><h1>Invalid link</h1><p>This link doesn\'t look right. Please contact Chris directly.</p><a href="tel:07595399525" class="btn-call">📞 Call Chris</a></div>';
    } else if (action === 'accept') {
      showAccepted(ref, firstName);
    } else {
      showDeclined(firstName);
    }

    // Update Supabase + notify Chris silently in background
    if (jobId && (action === 'accept' || action === 'decline')) {
      (async function() {
        try {
          var newStatus = action === 'accept' ? 'booked' : 'declined';
          var r = await sb.from('jobs').select('*').eq('id', jobId).single();
          if (r.data) {
            var job = Object.assign({}, r.data.data, { id: r.data.id, name: r.data.name, status: newStatus, created: r.data.created });
            job.status = newStatus;
            await sb.from('jobs').upsert({ id: job.id, name: job.name || '', status: newStatus, created: job.created, data: job });
          }
        } catch(e) {}
        // Notify Chris
        fetch('https://formspree.io/f/mvzdkwvw', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            _subject: (action === 'accept' ? '✅ Quote Accepted' : '❌ Quote Declined') + ' — ' + name + ' (' + ref + ')',
            customer:  name,
            quote_ref: ref,
            response:  action === 'accept' ? 'ACCEPTED' : 'DECLINED',
            message:   action === 'accept'
              ? name + ' has accepted quote ' + ref + '. Status updated to Booked. Call to arrange start date.'
              : name + ' has declined quote ' + ref + '. You may want to follow up.'
          })
        }).catch(function(){});
      })();
    }

    function showAccepted(ref, firstName) {
      document.getElementById('content').innerHTML =
        '<div class="card">' +
        '<div class="icon">✅</div>' +
        '<h1>Quote accepted!</h1>' +
        '<p>Thanks ' + esc(firstName) + '! We\'ve received your acceptance.</p>' +
        '<p style="margin-top:8px">Chris will be in touch shortly to confirm your start date.</p>' +
        '<p class="ref">Ref: ' + esc(ref) + '</p>' +
        '<a href="tel:07595399525" class="btn-call">📞 07595 399525</a>' +
        '</div>';
    }

    function showDeclined(firstName) {
      document.getElementById('content').innerHTML =
        '<div class="card">' +
        '<div class="icon">👋</div>' +
        '<h1>Thanks for letting us know</h1>' +
        '<p>' + esc(firstName) + ', we\'ve noted your response.</p>' +
        '<p style="margin-top:8px">If you change your mind or have any questions, don\'t hesitate to get in touch.</p>' +
        '<a href="tel:07595399525" class="btn-call">📞 07595 399525</a>' +
        '</div>';
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
